<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPM Agent — Live Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 32px 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f8fafc;
    }

    header h1 span { color: #6366f1; }

    .refresh-btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .refresh-btn:hover { background: #334155; color: #e2e8f0; }

    .last-updated {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
      text-align: right;
    }

    /* Section headers */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 12px;
      margin-top: 32px;
    }

    /* Stat cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
    }

    .card .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748b;
      margin-bottom: 8px;
    }

    .card .value {
      font-size: 28px;
      font-weight: 700;
      color: #f8fafc;
      line-height: 1;
    }

    .card .sub {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 6px;
    }

    .card.green  { border-color: #22c55e33; }
    .card.green .value { color: #22c55e; }
    .card.blue   { border-color: #6366f133; }
    .card.blue .value { color: #818cf8; }
    .card.amber  { border-color: #f59e0b33; }
    .card.amber .value { color: #fbbf24; }
    .card.purple { border-color: #a855f733; }
    .card.purple .value { color: #c084fc; }

    /* Tables */
    .table-wrap {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      background: #0f172a;
      color: #64748b;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 10px 16px;
      text-align: left;
    }

    td {
      padding: 11px 16px;
      border-top: 1px solid #1e293b;
      color: #cbd5e1;
    }

    tr:hover td { background: #0f172a44; }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }

    .pill-green  { background: #22c55e22; color: #22c55e; }
    .pill-blue   { background: #6366f122; color: #818cf8; }
    .pill-amber  { background: #f59e0b22; color: #fbbf24; }
    .pill-red    { background: #ef444422; color: #f87171; }
    .pill-gray   { background: #64748b22; color: #94a3b8; }

    /* Two-column layout */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }

    /* Loading / error states */
    .loading {
      color: #64748b;
      font-size: 14px;
      padding: 24px;
      text-align: center;
    }

    .error-msg {
      background: #7f1d1d33;
      border: 1px solid #ef444433;
      color: #f87171;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
    }

    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .dot-green  { background: #22c55e; }
    .dot-red    { background: #ef4444; }
    .dot-amber  { background: #f59e0b; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>CPM Agent — <span>Live Dashboard</span></h1>
  </div>
  <div>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
    <div class="last-updated" id="lastUpdated">Loading…</div>
  </div>
</header>

<!-- ── CPM PIPELINE ───────────────────────────────────────────────────────── -->
<div class="section-title">CPM Pipeline — Vercel Cron</div>
<div class="cards" id="cpmCards">
  <div class="loading">Fetching…</div>
</div>

<div style="margin-top:16px" class="section-title">Recent Cron Runs</div>
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Outcome</th>
        <th>Data Points</th>
        <th>Source</th>
      </tr>
    </thead>
    <tbody id="cpmRunsBody">
      <tr><td colspan="4" class="loading">Fetching…</td></tr>
    </tbody>
  </table>
</div>

<!-- ── AI TRACKER ─────────────────────────────────────────────────────────── -->
<div class="section-title" style="margin-top:40px">AI Interaction Tracker — ROI</div>
<div class="cards" id="roiCards">
  <div class="loading">Fetching…</div>
</div>

<div style="margin-top:16px" class="two-col">
  <div>
    <div class="section-title">By Provider</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Provider</th>
            <th>Tasks</th>
            <th>Value</th>
            <th>ROI</th>
            <th>1st Pass</th>
          </tr>
        </thead>
        <tbody id="providerBody">
          <tr><td colspan="5" class="loading">Fetching…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div>
    <div class="section-title">Recent Interactions</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>Tool</th>
            <th>Hours</th>
            <th>Value</th>
            <th>Quality</th>
          </tr>
        </thead>
        <tbody id="recentBody">
          <tr><td colspan="5" class="loading">Fetching…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const CPM_BASE = "https://cpm-vercel.vercel.app"

  // ── helpers ─────────────────────────────────────────────────────────────────

  function fmt(n, prefix = "", decimals = 0) {
    if (n === null || n === undefined) return "—"
    return prefix + Number(n).toLocaleString("en-US", { minimumFractionDigits: decimals, maximumFractionDigits: decimals })
  }

  function outcomeClass(o) {
    if (o === "autonomous") return "pill-green"
    if (o === "hitl")       return "pill-amber"
    if (o === "error")      return "pill-red"
    return "pill-gray"
  }

  function dot(o) {
    if (o === "autonomous") return '<span class="dot dot-green"></span>'
    if (o === "hitl")       return '<span class="dot dot-amber"></span>'
    return '<span class="dot dot-red"></span>'
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })
  }

  function roi(value, cost) {
    if (!cost || cost <= 0) return "∞"
    return Math.round(value / cost).toLocaleString() + "×"
  }

  // ── CPM pipeline ─────────────────────────────────────────────────────────────

  async function loadCpm() {
    try {
      const r    = await fetch(`${CPM_BASE}/api/metrics`)
      const data = await r.json()
      const s    = data.stats

      document.getElementById("cpmCards").innerHTML = `
        <div class="card green">
          <div class="label">Total Runs</div>
          <div class="value">${s.totalRuns}</div>
          <div class="sub">${s.autonomousRuns} autonomous</div>
        </div>
        <div class="card blue">
          <div class="label">Autonomous Rate</div>
          <div class="value">${s.totalRuns > 0 ? Math.round(s.autonomousRuns / s.totalRuns * 100) : 0}%</div>
          <div class="sub">${s.hitlRuns} HITL · ${s.errorRuns} errors</div>
        </div>
        <div class="card amber">
          <div class="label">HITL Events</div>
          <div class="value">${s.hitlRuns}</div>
          <div class="sub">Human-in-the-loop</div>
        </div>
        <div class="card">
          <div class="label">Status</div>
          <div class="value" style="font-size:18px">${dot("autonomous")} Live</div>
          <div class="sub">Cron: daily 8am EST</div>
        </div>
      `

      const rows = (data.runHistory ?? []).slice(0, 8)
      document.getElementById("cpmRunsBody").innerHTML = rows.map(r => `
        <tr>
          <td>${fmtDate(r.run_date)}</td>
          <td><span class="pill ${outcomeClass(r.outcome)}">${r.outcome}</span></td>
          <td>${r.data_points_found ?? 0}</td>
          <td><span class="pill pill-gray">${r.source}</span></td>
        </tr>
      `).join("") || '<tr><td colspan="4" class="loading">No runs yet</td></tr>'

    } catch (e) {
      document.getElementById("cpmCards").innerHTML = `<div class="error-msg">⚠ Could not load CPM data: ${e.message}</div>`
    }
  }

  // ── AI tracker ───────────────────────────────────────────────────────────────

  async function loadTracker() {
    try {
      const r    = await fetch(`${CPM_BASE}/api/tracker-stats?project=cpm-agent`)
      const data = await r.json()
      const t    = data.totals

      document.getElementById("roiCards").innerHTML = `
        <div class="card green">
          <div class="label">Total Value</div>
          <div class="value">${fmt(t.value_usd, "$")}</div>
          <div class="sub">${fmt(t.hours, "", 1)} hours automated</div>
        </div>
        <div class="card purple">
          <div class="label">ROI Multiple</div>
          <div class="value">${t.roi_multiple ? t.roi_multiple.toLocaleString() + "×" : "∞"}</div>
          <div class="sub">Value / API cost</div>
        </div>
        <div class="card blue">
          <div class="label">Interactions</div>
          <div class="value">${t.tasks}</div>
          <div class="sub">${fmt(data.first_pass_pct, "", 0)}% first-pass</div>
        </div>
        <div class="card amber">
          <div class="label">API Cost</div>
          <div class="value">${fmt(t.cost_usd, "$", 2)}</div>
          <div class="sub">${t.corrections} corrections total</div>
        </div>
      `

      document.getElementById("providerBody").innerHTML = (data.by_provider ?? []).map(p => `
        <tr>
          <td><strong>${p.provider}</strong><br><span style="color:#64748b;font-size:11px">${p.tool ?? ""}</span></td>
          <td>${p.total_tasks}</td>
          <td>${fmt(p.total_value_usd, "$")}</td>
          <td style="color:#c084fc">${roi(p.total_value_usd, p.total_cost_usd)}</td>
          <td>${fmt(p.first_pass_pct, "", 0)}%</td>
        </tr>
      `).join("") || '<tr><td colspan="5" class="loading">No data yet</td></tr>'

      document.getElementById("recentBody").innerHTML = (data.recent ?? []).map(r => `
        <tr>
          <td><span class="pill pill-blue">${r.task_type}</span></td>
          <td>${r.tool}</td>
          <td>${r.hours_estimate}h</td>
          <td>${fmt(r.value_usd, "$")}</td>
          <td>${r.first_pass
            ? '<span class="pill pill-green">✓ 1st pass</span>'
            : `<span class="pill pill-amber">${r.corrections} fix${r.corrections !== 1 ? "es" : ""}</span>`
          }</td>
        </tr>
      `).join("") || '<tr><td colspan="5" class="loading">No interactions yet</td></tr>'

    } catch (e) {
      document.getElementById("roiCards").innerHTML = `<div class="error-msg">⚠ Could not load tracker data: ${e.message}</div>`
    }
  }

  // ── load all ─────────────────────────────────────────────────────────────────

  async function loadAll() {
    document.getElementById("lastUpdated").textContent = "Refreshing…"
    await Promise.all([loadCpm(), loadTracker()])
    document.getElementById("lastUpdated").textContent =
      "Updated " + new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })
  }

  loadAll()
</script>
</body>
</html>
